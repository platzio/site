name: 🔎 CI

on:
  pull_request:
    branches:
      - main

# Least-privilege: both jobs only need to read the repo to check out and
# run npm. No write access to contents, issues, PRs, etc.
permissions:
  contents: read

jobs:
  format:
    name: 💅 Format check
    runs-on: ubuntu-latest
    steps:
      - name: 🛎 Checkout
        uses: actions/checkout@v5

      - name: 📦 Install dependencies
        run: npm ci

      - name: 💅 Prettier
        run: npm run format:check

  build:
    name: 🏗 Build
    runs-on: ubuntu-latest
    steps:
      - name: 🛎 Checkout
        uses: actions/checkout@v5

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗 Build
        run: npm run build
