name: 🔎 CI

on:
  pull_request:
    branches:
      - main

jobs:
  format:
    name: 💅 Format check
    runs-on: ubuntu-latest
    steps:
      - name: 🛎 Checkout
        uses: actions/checkout@v5

      - name: 📦 Install dependencies
        run: npm ci

      - name: 💅 Prettier
        run: npm run format:check

  build:
    name: 🏗 Build
    runs-on: ubuntu-latest
    steps:
      - name: 🛎 Checkout
        uses: actions/checkout@v5

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗 Build
        run: npm run build
